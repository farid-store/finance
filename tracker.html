    <style>
        /* Base Setup */
        html, body { 
            background-color: #020202; 
            color: #f8fafc; 
            overflow-x: hidden; 
            width: 100%; 
            position: relative; 
            padding-bottom: 80px; 
            overscroll-behavior-y: contain;
        }
        
        /* Modern Floating Glass - Compact */
        .glass-pill { 
            background: rgba(15, 15, 15, 0.65); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .glass-panel { 
            background: linear-gradient(145deg, rgba(30, 30, 30, 0.3) 0%, rgba(10, 10, 10, 0.8) 100%); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
        }
        
        /* Ambient Backgrounds */
        .ambient-glow-1 { 
            position: fixed; 
            top: -20%; 
            left: -20%; 
            width: 70vw; 
            height: 70vw; 
            background: radial-gradient(circle, rgba(14, 165, 233, 0.12) 0%, rgba(0, 0, 0, 0) 60%); 
            filter: blur(70px); 
            z-index: -1; 
            pointer-events: none;
        }
        
        .ambient-glow-2 { 
            position: fixed; 
            bottom: 10%; 
            right: -20%; 
            width: 60vw; 
            height: 60vw; 
            background: radial-gradient(circle, rgba(129, 140, 248, 0.08) 0%, rgba(0, 0, 0, 0) 60%); 
            filter: blur(70px); 
            z-index: -1; 
            pointer-events: none;
        }

        /* Loader */
        .spinner { 
            width: 24px; 
            height: 24px; 
            border: 2px solid rgba(255, 255, 255, 0.1); 
            border-radius: 50%; 
            border-top-color: #0ea5e9; 
            animation: spin 1s linear infinite; 
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        /* Hide Scrollbar */
        .hide-scroll::-webkit-scrollbar { 
            display: none; 
        }
        .hide-scroll { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }
        
        /* Card Hover Effect */
        .premium-hover { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .premium-hover:hover { 
            transform: translateY(-2px); 
            border-color: rgba(56, 189, 248, 0.2); 
            box-shadow: 0 8px 30px -10px rgba(56, 189, 248, 0.1); 
        }

        /* Snappy Tab Animation */
        .tab-content { 
            display: none; 
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        
        .tab-content.active { 
            display: block; 
        }
        
        @keyframes popIn { 
            from { opacity: 0; transform: scale(0.96) translateY(10px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }

        /* Progress Bars */
        .bar-container { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.06); 
            overflow: hidden; 
            position: relative;
        }
        
        .bar-fill { 
            height: 100%; 
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); 
            position: relative;
        }

        /* Toggle Switch Minimalist */
        .switch-container { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }
        
        .switch { 
            position: relative; 
            display: inline-block; 
            width: 36px; 
            height: 20px; 
        }
        
        .switch input { 
            opacity: 0; 
            width: 0; 
            height: 0; 
        }
        
        .slider { 
            position: absolute; 
            cursor: pointer; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background-color: rgba(255, 255, 255, 0.1); 
            border-radius: 20px; 
            transition: .3s; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .slider:before { 
            position: absolute; 
            content: ""; 
            height: 14px; 
            width: 14px; 
            left: 2px; 
            bottom: 2px; 
            background-color: #94a3b8; 
            border-radius: 50%; 
            transition: .3s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        
        input:checked + .slider { 
            background-color: rgba(14, 165, 233, 0.2); 
            border-color: rgba(14, 165, 233, 0.4); 
        }
        
        input:checked + .slider:before { 
            transform: translateX(16px); 
            background-color: #38bdf8; 
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.6); 
        }

        /* Pull To Refresh Indicator */
        #ptr-indicator { 
            text-align: center; 
            color: #94a3b8; 
            font-size: 11px; 
            font-weight: 600; 
            height: 0; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            transition: height 0.2s ease; 
        }

        /* Nav Item Active States */
        .nav-item.active { 
            color: white; 
            background: rgba(255, 255, 255, 0.08); 
        }
        
        .nav-item.active i { 
            transform: translateY(-1px); 
            color: #38bdf8;
        }
        
        .nav-item.active span { 
            height: auto; 
            opacity: 1; 
            margin-top: 2px;
        }
    </style>
</head>

        function formatRp(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1).replace(/\.0$/, '') + ' Jt';
            } else {
                return new Intl.NumberFormat('id-ID', { 
                    style: 'currency', 
                    currency: 'IDR', 
                    minimumFractionDigits: 0

        }

        function formatRpFull(num) {
            return new Intl.NumberFormat('id-ID', { 
                style: 'currency', 
                currency: 'IDR', 
                minimumFractionDigits: 0 
            }).format(num);
        }

        const roadmapTargets = [
            { month: 1, profit: 4500000 }, 
            { month: 2, profit: 5400000 },
            { month: 3, profit: 6075000 }, 
            { month: 4, profit: 6750000 },
            { month: 5, profit: 6750000 }, 
            { month: 6, profit: 7200000 },
            { month: 7, profit: 7200000 }, 
            { month: 8, profit: 7650000 },
            { month: 9, profit: 7650000 }, 
            { month: 10, profit: 7875000 },
            { month: 11, profit: 7875000 }, 
            { month: 12, profit: 6750000 }
        ];

        // Variabel Global
        let salesChartInstance = null;
        let doughnutChartInstance = null;
        let goalChartInstance = null;
        let globalRawData = null;
        let isNetProfitMode = false;

        // Penampung Data Global untuk Re-render Animasi Chart
        let cacheGoal = { cur: 0, rem: 100000000 };
        let cacheAlloc = { owner: 0, emp: 0, retained: 0 };
        let cacheTrend = { labels: [], profit: [], unit: [] };

        // ==========================================
        // FUNGSI GANTI TAB & ANIMASI
        // ==========================================
        function switchTab(tabId, el) {
            // Hapus kelas active dari semua konten dan tombol
            document.querySelectorAll('.tab-content').forEach(function(t) {
                t.classList.remove('active');
            });
            document.querySelectorAll('.nav-item').forEach(function(n) {
                n.classList.remove('active');
            });
            
            // Tambahkan kelas active ke tab yang dipilih
            document.getElementById(`tab-${tabId}`).classList.add('active');
            el.classList.add('active');

            // Hancurkan dan gambar ulang chart agar animasi berjalan setiap kali tab dibuka
            if (tabId === 'dashboard') {
                renderGoalChart(cacheGoal.cur, cacheGoal.rem);
            } else if (tabId === 'analytics') {
                renderDoughnutChart(cacheAlloc.owner, cacheAlloc.emp, cacheAlloc.retained);
            } else if (tabId === 'performance') {
                renderLineChart(cacheTrend.labels, cacheTrend.profit, cacheTrend.unit);
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleNetProfit() {
            isNetProfitMode = document.getElementById('netProfitToggle').checked;
            
            if (isNetProfitMode) {
                document.getElementById('labelNetto').innerText = 'Bersih';
            } else {
                document.getElementById('labelNetto').innerText = 'Kotor';
            }
            
            if (globalRawData) {
                processData(globalRawData); 
            }
        }

        function animateValue(id, start, end, duration, isCurrency = true) {
            if (start === end) return;
            const obj = document.getElementById(id);
            if (!obj) return;
            
            let startTimestamp = null;
            
            const step = function(timestamp) {
                if (!startTimestamp) {
                    startTimestamp = timestamp;
                }
                
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Fungsi peredam animasi (Ease out cubic)
                const easeProgress = 1 - Math.pow(1 - progress, 3); 
                const currentVal = Math.floor(easeProgress * (end - start) + start);
                
                if (isCurrency) {
                    obj.innerHTML = `Rp ${currentVal.toLocaleString('id-ID')}`;
                } else {
                    obj.innerHTML = currentVal;
                }
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    if (isCurrency) {
                        obj.innerHTML = `Rp ${end.toLocaleString('id-ID')}`;
                    } else {
                        obj.innerHTML = end;
                    }
                }
            };
            
            window.requestAnimationFrame(step);
        }

        // ==========================================
        // FETCH DATA DAN PARSING
        // ==========================================
        async function fetchDatabase() {
            const syncIcon = document.querySelector('#syncStatus i');
            syncIcon.className = 'fas fa-spinner fa-spin text-brand-400';
            
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    method: 'GET', 
                    headers: { 
                        'X-Master-Key': API_KEY, 
                        'X-Access-Key': API_KEY 
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP Error Status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Indikator berhasil
                syncIcon.className = 'fas fa-check text-green-400';
                setTimeout(function() { 
                    syncIcon.className = 'fas fa-cloud-arrow-down text-gray-400'; 
                }, 2000);
                
                return data.record;
                
            } catch (error) {
                console.error("Gagal terhubung ke database:", error);
                syncIcon.className = 'fas fa-triangle-exclamation text-red-500';
                return null;
            }
        }

        function parseDateString(dateString) { 
            if (!dateString || dateString === 'Imported' || dateString === 'Bulan Lalu') {
                return new Date();
            }
            
            const parts = dateString.split(' ');
            
            if (parts[0].includes('-')) {
                return new Date(parts[0]);
            }
            
            const d = parts[0].split('/');
            // Format: DD/MM/YYYY
            return new Date(d[2], d[1] - 1, d[0]); 
        }

        function getBrand(name) {
            const n = name.toUpperCase();
            
            if (n.includes('IPHONE') || n.includes('APPLE') || n.includes('IPAD')) {
                return 'Apple';
            }
            if (n.includes('SAMSUNG') || n.includes('GALAXY') || n.startsWith('SAM ')) {
                return 'Samsung';
            }
            if (n.includes('XIAOMI') || n.includes('REDMI') || n.includes('POCO') || n.includes('MI ')) {
                return 'Xiaomi';
            }
            if (n.includes('OPPO') || n.includes('RENO')) {
                return 'Oppo';
            }
            if (n.includes('VIVO') || n.includes('IQOO')) {
                return 'Vivo';
            }
            if (n.includes('REALME') || n.includes('NARZO')) {
                return 'Realme';
            }
            if (n.includes('INFINIX')) {
                return 'Infinix';
            }
            if (n.includes('TECNO')) {
                return 'Tecno';
            }
            if (n.includes('ITEL')) {
                return 'iTel';
            }
            
            // Kembalikan kata pertama jika tidak terdeteksi merk di atas
            return n.split(' ')[0]; 
        }

        // ==========================================
        // PROSES DATA UTAMA
        // ==========================================
        function processData(db) {
            let monthlyActuals = {};
            let brandStats = {};
            
            let startBalance = Number(db.startBalance) || 0;
            let belanjaBaru = 0;
            let uangMasuk = 0;
            let profitMain = 0;
            let profitEkstra = 0;
            let floatModal = 0;
            let floatPrice = 0;
            let totalUnit = 0;
            let agingStocks = [];

            // Loop melalui setiap item HP
            if (db.items) {
                db.items.forEach(function(i) {
                    if (i.status === 'sold') {
                        totalUnit++;
                        
                        if (i.type === 'new') {
                            belanjaBaru += i.modal;
                        }
                        
                        uangMasuk += i.price;
                        
                        let p = i.price - i.modal; 
                        profitMain += p;

                        // Klasifikasi Brand
                        let b = getBrand(i.name);
                        if (!brandStats[b]) {
                            brandStats[b] = { profit: 0, count: 0 };
                        }
                        brandStats[b].profit += p; 
                        brandStats[b].count += 1;
                        
                        // Menghitung Aktual Bulanan
                        if (i.soldAt) {
                            let d = parseDateString(i.soldAt);
                            let mk = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                            
                            if (!monthlyActuals[mk]) {
                                monthlyActuals[mk] = { units: 0, profit: 0 };
                            }
                            
                            monthlyActuals[mk].units += 1; 
                            monthlyActuals[mk].profit += p;
                        }
                        
                    } else if (i.status === 'stok') {
                        
                        if (i.type === 'new') {
                            belanjaBaru += i.modal;
                        }
                        
                        floatPrice += i.price;
                        floatModal += i.modal;
                        
                        let ad = 0;
                        if (i.id) { 
                            ad = Math.floor(Math.abs(new Date() - new Date(Math.floor(i.id))) / 86400000); 
                        }
                        agingStocks.push({ name: i.name, days: ad });
                    }
                });
            }

            // Loop melalui ekstra profit
            if (db.extraProfits) {
                db.extraProfits.forEach(function(p) {
                    profitEkstra += p.profit; 
                    totalUnit++; 
                    
                    let d = new Date(Math.floor(p.id)); 
                    let mk = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    
                    if (!monthlyActuals[mk]) {
                        monthlyActuals[mk] = { units: 0, profit: 0 };
                    }
                    
                    monthlyActuals[mk].profit += p.profit; 
                    monthlyActuals[mk].units += 1;
                });
            }

            // Kalkulasi Netto / Kotor
            let totalGaji = 0; 
            const GAJI = 2500000; 
            
            for (let k in monthlyActuals) {
                monthlyActuals[k].kotor = monthlyActuals[k].profit; 
                if (isNetProfitMode) { 
                    monthlyActuals[k].profit -= GAJI; 
                    totalGaji += GAJI; 
                }
            }

            let totalBersih = profitMain + profitEkstra;
            if (isNetProfitMode) {
                totalBersih -= totalGaji;
            }

            // Logika Aset
            const cashSisa = startBalance - belanjaBaru + uangMasuk;
            const totalAsetReal = cashSisa + floatPrice; 
            
            // Urutkan stok berdasarkan hari terlama
            agingStocks.sort(function(a, b) {
                return b.days - a.days;
            });

            updateUI(monthlyActuals, totalAsetReal, totalBersih, totalUnit, cashSisa, floatPrice, agingStocks, brandStats);
        }

        // ==========================================
        // UPDATE ANTARMUKA UI
        // ==========================================
        function updateUI(actuals, totalAset, globalGross, globalUnits, cash, stock, aging, brands) {
            
            // 1. UPDATE TAB DASHBOARD
            let sisaTarget = 100000000 - totalAset;
            cacheGoal.cur = totalAset; 
            cacheGoal.rem = sisaTarget > 0 ? sisaTarget : 0;
            
            let percentageGoal = Math.min((totalAset / 100000000) * 100, 100).toFixed(1);
            document.getElementById('uiGoalPct').innerText = `${percentageGoal}%`;
            
            let mKeys = Object.keys(actuals).sort();
            let recentProfitsSum = 0;
            let lastThreeMonths = mKeys.slice(-3);
            
            lastThreeMonths.forEach(function(k) {
                recentProfitsSum += actuals[k].profit;
            });
            
            let avgRecentProfit = recentProfitsSum / (Math.min(mKeys.length, 3) || 1);
            let etaText = "Need Data";
            
            if (sisaTarget <= 0) {
                document.getElementById('uiEtaBadge').className = "bg-green-500/10 border border-green-500/20 text-green-400 px-2.5 py-1 rounded-full text-[9px] font-bold uppercase tracking-wide flex items-center gap-1.5";
                document.getElementById('uiEtaBadge').innerHTML = `<i class="fas fa-check"></i> Done`;
            } else if (avgRecentProfit > 0) {
                let d = new Date(); 
                let monthsLeft = Math.ceil(sisaTarget / avgRecentProfit);
                d.setMonth(d.getMonth() + monthsLeft);
                
                const monthNamesShort = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
                etaText = `Est. ${monthNamesShort[d.getMonth()]} ${String(d.getFullYear()).slice(-2)}`;
                document.getElementById('uiEtaBadge').innerHTML = `<i class="fas fa-clock"></i> ${etaText}`;
            }

            // Render Goal Chart jika tab sedang aktif
            if (document.getElementById('tab-dashboard').classList.contains('active')) {
                renderGoalChart(cacheGoal.cur, cacheGoal.rem);
            }

            // Animate Valuasi Aset dan Profit
            const prevAset = parseInt(document.getElementById('uiTotalAsset').innerText.replace(/\D/g,'')) || 0;
            const prevProfit = parseInt(document.getElementById('uiTotalProfit').innerText.replace(/\D/g,'')) || 0;
            
            animateValue('uiTotalAsset', prevAset, totalAset, 1000);
            animateValue('uiTotalProfit', prevProfit, globalGross, 1000);
            document.getElementById('uiTotalUnits').innerText = `${globalUnits} Unit`;

            // Milestone
            let nextMil = MILESTONES.find(function(m) {
                return m > totalAset;
            }) || 100000000;
            
            let milestonePct = Math.min((totalAset / nextMil) * 100, 100);
            document.getElementById('uiNextMilestone').innerText = formatRpFull(nextMil);
            document.getElementById('milestoneBar').style.width = `${milestonePct}%`;
            
            // Komposisi Aset
            let cashPct = totalAset > 0 ? (cash / totalAset) * 100 : 0;
            let stockPct = totalAset > 0 ? (stock / totalAset) * 100 : 0;
            
            document.getElementById('barCash').style.width = `${cashPct}%`;
            document.getElementById('barStock').style.width = `${stockPct}%`;
            document.getElementById('uiValCash').innerText = formatRpFull(cash);
            document.getElementById('uiValStock').innerText = formatRpFull(stock);


            // 2. UPDATE TAB ANALYTICS
            let currDate = new Date();
            let currMk = `${currDate.getFullYear()}-${String(currDate.getMonth() + 1).padStart(2, '0')}`;
            
            let cp = 0;
            if (actuals[currMk]) {
                if (actuals[currMk].kotor !== undefined) {
                    cp = actuals[currMk].kotor;
                } else {
                    cp = actuals[currMk].profit;
                }
            }
            
            // Brands Sorting
            let bArr = Object.keys(brands).map(function(k) {
                return { n: k, p: brands[k].profit, c: brands[k].count };
            });
            
            bArr.sort(function(a, b) {
                return b.p - a.p;
            });
            
            bArr = bArr.slice(0, 4);
            
            const tbUI = document.getElementById('topBrandsUI'); 
            tbUI.innerHTML = '';
            
            bArr.forEach(function(b, i) {
                let s = '';
                if (i === 0) s = 'text-orange-400 bg-orange-400/10';
                else if (i === 1) s = 'text-gray-300 bg-gray-400/10';
                else if (i === 2) s = 'text-amber-600 bg-amber-600/10';
                else s = 'text-gray-500 bg-white/5';

                tbUI.innerHTML += `
                    <div class="flex justify-between p-2.5 rounded-xl bg-white/[0.02] border border-white/5">
                        <div class="flex items-center gap-2.5">
                            <div class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black ${s}">
                                ${i + 1}
                            </div>
                            <span class="font-heading text-sm font-bold text-white">${b.n}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-xs font-bold text-green-400">${formatRpFull(b.p)}</div>
                            <div class="text-[8px] text-gray-500 uppercase tracking-wider">${b.c} Unit</div>
                        </div>
                    </div>
                `;
            });

            // Gaji
            cacheAlloc.owner = Math.min(1500000, Math.max(cp, 0));
            cacheAlloc.emp = Math.max(0, Math.min(1000000, cp - 1500000));
            cacheAlloc.retained = Math.max(0, cp - 2500000);
            
            if (document.getElementById('tab-analytics').classList.contains('active')) {
                renderDoughnutChart(cacheAlloc.owner, cacheAlloc.emp, cacheAlloc.retained);
            }

            // Aging Stock
            const alUI = document.getElementById('agingListUI'); 
            alUI.innerHTML = '';
            
            aging.slice(0, 5).forEach(function(item) {
                let dClass = '';
                if (item.days > 30) {
                    dClass = 'text-red-400 bg-red-400/10';
                } else if (item.days > 14) {
                    dClass = 'text-warning bg-warning/10';
                } else {
                    dClass = 'text-gray-400 bg-white/5';
                }
                
                alUI.innerHTML += `
                    <div class="flex justify-between items-center pb-2.5 border-b border-white/5 last:border-0 last:pb-0">
                        <span class="text-[11px] font-medium text-gray-300 pr-2 line-clamp-1">${item.name}</span>
                        <span class="px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-widest shrink-0 ${dClass}">${item.days} Hari</span>
                    </div>
                `;
            });

            // 3. UPDATE TAB PERFORMANCE
            cacheTrend.labels = []; 
            cacheTrend.profit = []; 
            cacheTrend.unit = [];
            
            const tb = document.getElementById('trackerBody'); 
            tb.innerHTML = '';
            
            let avgM = 150000;
            if (globalUnits > 0) {
                avgM = globalGross / globalUnits;
            }
            
            let def = 0;

            const monthNamesFull = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];

            roadmapTargets.forEach(function(t, i) {
                let y = 2026 + Math.floor((1 + i) / 12);
                let m = ((1 + i) % 12) + 1;
                let mk = `${y}-${String(m).padStart(2, '0')}`;
                
                let u = 0;
                let p = 0;
                
                if (actuals[mk]) {
                    u = actuals[mk].units;
                    p = actuals[mk].profit;
                }

                cacheTrend.labels.push(`${monthNamesFull[m-1]} '${String(y).slice(-2)}`);
                cacheTrend.profit.push(p); 
                cacheTrend.unit.push(u);

                let st = t.profit + def; 
                if (st < 0) {
                    st = t.profit; 
                }
                
                let dt = Math.ceil(st / (u > 0 ? (p/u) : avgM)); 
                if (p >= st) {
                    dt = u; 
                }
                
                if (mk <= currMk) {
                    def += (t.profit - p);
                }

                let pPct = Math.min((p / st) * 100, 100) || 0;
                let uPct = Math.min((u / dt) * 100, 100) || 0;
                let isC = mk === currMk;

                let bBadge = '';
                if (p >= st) {
                    bBadge = '<span class="bg-green-500/10 text-green-400 px-1.5 py-0.5 rounded text-[8px] font-bold uppercase"><i class="fas fa-check"></i></span>';
                } else if (p > 0) {
                    bBadge = '<span class="bg-warning/10 text-warning px-1.5 py-0.5 rounded text-[8px] font-bold uppercase">Proses</span>';
                } else {
                    bBadge = '<span class="bg-white/5 text-gray-500 px-1.5 py-0.5 rounded text-[8px] font-bold uppercase">Wait</span>';
                }

                let currentCardClass = isC ? 'border-brand-500/40 bg-brand-500/5' : '';
                let currentIndicator = isC ? '<span class="w-1.5 h-1.5 rounded-full bg-brand-400 inline-block animate-pulse"></span>' : '';

                tb.innerHTML += `
                    <div class="glass-panel rounded-2xl p-4 relative ${currentCardClass}">
                        <div class="flex justify-between items-center mb-3">
                            <h4 class="font-heading text-sm font-bold text-white">
                                Bulan ${t.month} ${currentIndicator}
                            </h4>
                            ${bBadge}
                        </div>
                        <div class="flex justify-between text-[10px] font-bold mb-1">
                            <span class="text-gray-400">Laba</span>
                            <span class="text-white">${formatRp(p)} <span class="text-gray-500 font-normal">/ ${formatRp(st)}</span></span>
                        </div>
                        <div class="bar-container h-1 rounded-full mb-2.5">
                            <div class="bar-fill bg-green-500" style="width: ${pPct}%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-bold mb-1">
                            <span class="text-gray-400">Vol</span>
                            <span class="text-white">${u} <span class="text-gray-500 font-normal">/ ${dt}</span></span>
                        </div>
                        <div class="bar-container h-1 rounded-full">
                            <div class="bar-fill bg-brand-500" style="width: ${uPct}%"></div>
                        </div>
                    </div>
                `;
            });
            
            if (document.getElementById('tab-performance').classList.contains('active')) {
                renderLineChart(cacheTrend.labels, cacheTrend.profit, cacheTrend.unit);
            }
        }

        // ==========================================
        // INISIALISASI DAN EVENT LISTENER
        // ==========================================
        async function initDashboard() {
            const cached = localStorage.getItem('fsCacheV10');
            
            if (cached) { 
                globalRawData = JSON.parse(cached); 
                processData(globalRawData); 
            }
            
            const db = await fetchDatabase();
            
            if (db) { 
                localStorage.setItem('fsCacheV10', JSON.stringify(db)); 
                globalRawData = db; 
                processData(db); 
            }
        }

        // Pull To Refresh Logic
        let startY = 0;
        let isPulling = false; 
        
        const ptrIndicator = document.getElementById('ptr-indicator');
        const ptrIcon = document.getElementById('ptr-icon');
        const ptrText = document.getElementById('ptr-text');
        
        document.addEventListener('touchstart', function(e) { 
            if (window.scrollY === 0) { 
                startY = e.touches[0].pageY; 
                isPulling = true; 
            } 
        }, { passive: true });
        
        document.addEventListener('touchmove', function(e) { 
            if (!isPulling) return; 
            
            let diff = e.touches[0].pageY - startY; 
            
            if (diff > 0 && window.scrollY === 0) { 
                let height = Math.min(diff * 0.5, 80); 
                ptrIndicator.style.height = height + 'px'; 
                
                if (height > 60) { 
                    ptrIcon.style.transform = 'rotate(180deg)'; 
                    ptrText.innerText = 'Release'; 
                } else { 
                    ptrIcon.style.transform = 'rotate(0deg)'; 
                    ptrText.innerText = 'Pull...'; 
                } 
            } 
        }, { passive: true });
        
        document.addEventListener('touchend', function() { 
            if (!isPulling) return; 
            isPulling = false; 
            
            if (parseInt(ptrIndicator.style.height || 0) > 60) { 
                ptrIcon.className = 'fas fa-circle-notch fa-spin'; 
                ptrText.innerText = 'Syncing...'; 
                
                initDashboard().then(function() {
                    setTimeout(function() {
                        ptrIndicator.style.height = '0px';
                    }, 500);
                }); 
            } else {
                ptrIndicator.style.height = '0px';
            }
        });

        // Jalankan saat pertama kali dimuat
        window.onload = initDashboard;
    </script>
