<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farid Store | Mobile 100M Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4FD1C5; 
            --primary-dark: #319795;
            --secondary: #10b981; 
            --bg-color: #0b1120; 
            --card-bg: rgba(30, 41, 59, 0.8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(79, 209, 197, 0.15);
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px 12px;
            padding-bottom: 40px;
        }

        .container { max-width: 600px; margin: 0 auto; } /* Optimized for Mobile Width */

        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .header-title h1 { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 2px;}
        .header-title p { color: var(--primary); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;}

        .btn-sync {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #0b1120; border: none; padding: 10px 14px; border-radius: 10px;
            font-weight: 800; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px;
            box-shadow: 0 4px 10px rgba(79, 209, 197, 0.3);
        }
        .btn-sync:active { transform: scale(0.95); }

        /* Top Summary Cards (Compact) */
        .summary-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 25px; }

        .stat-card {
            background: var(--card-bg); padding: 18px; border-radius: 16px;
            border: 1px solid var(--border); position: relative;
            backdrop-filter: blur(10px);
        }

        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
            background: var(--primary);
        }
        .stat-card.success::before { background: var(--secondary); }

        .stat-icon { position: absolute; top: 18px; right: 18px; font-size: 24px; color: var(--primary); opacity: 0.2; }
        .stat-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
        .stat-value { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 6px; }
        .stat-sub { font-size: 11px; color: var(--text-muted); }

        /* Chart Area (Horizontal Scroll on Mobile) */
        .panel {
            background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border);
            padding: 15px; margin-bottom: 20px;
        }
        .panel-header { font-size: 13px; font-weight: 800; color: #fff; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        
        .chart-wrapper { width: 100%; overflow-x: auto; padding-bottom: 10px; }
        .chart-container { position: relative; height: 220px; min-width: 500px; /* Forces scroll on small screens */ }

        /* Monthly Cards List (Mobile Replacement for Table) */
        .month-list { display: flex; flex-direction: column; gap: 12px; }

        .m-card {
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(79, 209, 197, 0.1);
            border-radius: 14px; padding: 15px; position: relative;
        }

        .m-card.active { border-color: var(--primary); background: rgba(79, 209, 197, 0.05); }

        .mc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .mc-title { font-size: 14px; font-weight: 800; color: #fff; }
        .mc-subtitle { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px;}
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .badge-success { background: rgba(16, 185, 129, 0.15); color: var(--secondary); border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-pending { background: rgba(148, 163, 184, 0.1); color: var(--text-muted); border: 1px solid rgba(148, 163, 184, 0.2); }

        /* Custom Progress Bars for inside Monthly Cards */
        .mc-stat { margin-bottom: 12px; }
        .mc-stat:last-child { margin-bottom: 0; }
        .mc-stat-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; font-weight: 600;}
        
        .bar-bg { width: 100%; background: rgba(0,0,0,0.3); height: 6px; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
        .fill-profit { background: linear-gradient(90deg, #10b981, #059669); }
        .fill-unit { background: linear-gradient(90deg, #4FD1C5, #319795); }

        .val-actual { color: #fff; font-weight: 800; }
        .val-target { color: var(--text-muted); }

        .avg-margin-text { font-size: 10px; color: var(--text-muted); margin-top: 8px; text-align: right; font-style: italic;}

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-title">
            <h1>PORTFOLIO TRACKER</h1>
            <p>100M Goal | Farid Store</p>
        </div>
        <button class="btn-sync" onclick="initDashboard()" id="syncBtn">
            <i class="fas fa-bolt"></i> Sync
        </button>
    </header>

    <div class="summary-grid">
        <div class="stat-card" id="cardAsset">
            <i class="fas fa-wallet stat-icon"></i>
            <div class="stat-title">Aset Saat Ini (Unrealized)</div>
            <div class="stat-value" id="uiTotalAsset">Rp 0</div>
            <div class="stat-sub">Modal Murni: <span id="uiAssetStart" style="color: #fff">Rp 0</span></div>
        </div>
        
        <div class="stat-card">
            <i class="fas fa-chart-line stat-icon"></i>
            <div class="stat-title">Akumulasi Profit Global</div>
            <div class="stat-value" id="uiTotalProfit" style="color: var(--secondary);">Rp 0</div>
            <div class="bar-bg" style="height: 4px; margin-top: 8px;"><div class="bar-fill fill-profit" id="globalProfitBar" style="width: 0%;"></div></div>
            <div class="stat-sub" style="margin-top: 6px; text-align: right;">Target: Rp 80 Jt</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header"><i class="fas fa-chart-area"></i> Grafik 12 Bulan (Geser)</div>
        <div class="chart-wrapper">
            <div class="chart-container">
                <canvas id="salesChart"></canvas>
            </div>
        </div>
    </div>

    <div class="panel" style="padding: 15px 10px; background: transparent; border: none;">
        <div class="panel-header" style="padding-left: 5px;"><i class="fas fa-list-check"></i> Progres Detail per Bulan</div>
        <div class="month-list" id="trackerBody">
            </div>
    </div>
</div>

<script>
    // ==========================================
    // KREDENSIAL JSONBIN
    // ==========================================
    const BIN_ID = '699644fdae596e708f3582af'; 
    const API_KEY = '$2a$10$tcKHEWwuz2sqRoMCKJfga.1xxTFW0RxpXUPnP.NI4YbivtlK1xxau'; 
    // ==========================================

    const formatRp = (num) => {
        if(num >= 1000000) return (num/1000000).toFixed(2).replace(/\.00$/, '') + ' Jt';
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    };
    
    const formatRpFull = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);

    const roadmapTargets = [
        { month: 1, profit: 4500000 }, { month: 2, profit: 5400000 },
        { month: 3, profit: 6075000 }, { month: 4, profit: 6750000 },
        { month: 5, profit: 6750000 }, { month: 6, profit: 7200000 },
        { month: 7, profit: 7200000 }, { month: 8, profit: 7650000 },
        { month: 9, profit: 7650000 }, { month: 10, profit: 7875000 },
        { month: 11, profit: 7875000 }, { month: 12, profit: 6750000 }
    ];

    let salesChartInstance = null;

    async function fetchDatabase() {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            method: 'GET',
            headers: { 'X-Master-Key': API_KEY, 'X-Access-Key': API_KEY, 'Content-Type': 'application/json' }
        });
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        const data = await response.json();
        return data.record;
    }

    function parseDateString(s) { 
        if(!s || s === 'Imported' || s === 'Bulan Lalu') return new Date();
        const p = s.split(' ');
        if (p[0].includes('-')) return new Date(p[0]);
        const d = p[0].split('/');
        return new Date(d[2], d[1]-1, d[0]); 
    }

    function processData(db) {
        let monthlyActuals = {};
        let startBalance = Number(db.startBalance) || 0;
        let globalGrossProfit = 0;
        let globalUnitTerjual = 0;

        // Proses Item Utama
        if(db.items) {
            db.items.forEach(i => {
                if (i.status === 'sold' && i.soldAt) {
                    let d = parseDateString(i.soldAt);
                    let monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    if(!monthlyActuals[monthKey]) monthlyActuals[monthKey] = { units: 0, profit: 0 };
                    
                    let profitItem = i.price - i.modal;
                    monthlyActuals[monthKey].units += 1;
                    monthlyActuals[monthKey].profit += profitItem;
                    
                    globalGrossProfit += profitItem;
                    globalUnitTerjual += 1;
                }
            });
        }

        // Proses Extra Profit
        if(db.extraProfits) {
            db.extraProfits.forEach(p => {
                let calcProfit = p.profit;
                if(p.name === 'Poco M3' && p.modal === 400000) calcProfit = p.price - 450000; // Koreksi
                
                let d = new Date(Math.floor(p.id)); 
                let monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                if(!monthlyActuals[monthKey]) monthlyActuals[monthKey] = { units: 0, profit: 0 };
                
                monthlyActuals[monthKey].profit += calcProfit;
                monthlyActuals[monthKey].units += 1;
                
                globalGrossProfit += calcProfit;
                globalUnitTerjual += 1;
            });
        }

        let totalAsetReal = startBalance + globalGrossProfit; 
        updateUI(monthlyActuals, totalAsetReal, globalGrossProfit, globalUnitTerjual, startBalance);
    }

    function updateUI(actualsData, totalAset, globalGrossProfit, globalUnits, startBalance) {
        const tbody = document.getElementById('trackerBody');
        tbody.innerHTML = '';
        
        // Update Header Cards
        document.getElementById('uiAssetStart').innerText = formatRpFull(startBalance);
        document.getElementById('uiTotalAsset').innerText = formatRpFull(totalAset);
        document.getElementById('uiTotalProfit').innerText = '+ ' + formatRpFull(globalGrossProfit);
        
        if(totalAset >= 100000000) document.getElementById('cardAsset').classList.add('success');
        document.getElementById('globalProfitBar').style.width = `${Math.min((globalGrossProfit/80000000)*100, 100)}%`;

        let chartLabels = [];
        let chartProfitData = [];
        let chartActualUnits = [];
        
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
        
        let startMonth = 2; // Mulai Februari
        let startYear = 2026;
        let globalAvgMargin = globalUnits > 0 ? (globalGrossProfit / globalUnits) : 150000;

        let currentDate = new Date();
        let currentMonthKey = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;

        // Generate 12 Cards based on Roadmap
        roadmapTargets.forEach((t, index) => {
            let m = ((startMonth - 1 + index) % 12) + 1;
            let y = startYear + Math.floor((startMonth - 1 + index) / 12);
            let monthKey = `${y}-${String(m).padStart(2, '0')}`;
            
            let actUnits = actualsData[monthKey] ? actualsData[monthKey].units : 0;
            let actProfit = actualsData[monthKey] ? actualsData[monthKey].profit : 0;

            // Chart Data
            chartLabels.push(`${monthNames[m-1]} ${y}`);
            chartProfitData.push(actProfit);
            chartActualUnits.push(actUnits);

            // Perhitungan Dinamis Kartu Bulanan
            let avgThisMonth = actUnits > 0 ? (actProfit / actUnits) : globalAvgMargin;
            let dynamicTargetUnit = Math.ceil(t.profit / avgThisMonth); 
            // Jika profit target sudah lewat, samakan target dengan yg terjual
            if (actProfit >= t.profit) dynamicTargetUnit = actUnits; 
            
            let profitPct = Math.min((actProfit / t.profit) * 100, 100);
            let unitPct = Math.min((actUnits / dynamicTargetUnit) * 100, 100);

            let statusBadge = actProfit >= t.profit 
                ? '<span class="badge badge-success"><i class="fas fa-check"></i> Tercapai</span>' 
                : (actProfit > 0 ? '<span class="badge badge-warning">Proses</span>' : '<span class="badge badge-pending">Pending</span>');

            let isCurrent = (monthKey === currentMonthKey);
            
            const card = document.createElement('div');
            card.className = `m-card ${isCurrent ? 'active' : ''}`;
            
            card.innerHTML = `
                <div class="mc-header">
                    <div>
                        <div class="mc-title">Bulan ${t.month} ${isCurrent ? '<i class="fas fa-star" style="color:var(--warning); font-size:10px;"></i>' : ''}</div>
                        <span class="mc-subtitle">${monthNames[m-1]} ${y}</span>
                    </div>
                    ${statusBadge}
                </div>
                
                <div class="mc-stat">
                    <div class="mc-stat-header">
                        <span style="color: var(--secondary)">Laba Margin</span>
                        <span><span class="val-actual">${formatRp(actProfit)}</span> <span class="val-target">/ ${formatRp(t.profit)}</span></span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill fill-profit" style="width: ${profitPct}%"></div></div>
                </div>

                <div class="mc-stat">
                    <div class="mc-stat-header">
                        <span style="color: var(--primary)">Penjualan Unit</span>
                        <span><span class="val-actual">${actUnits}</span> <span class="val-target">/ ${dynamicTargetUnit} Unit</span></span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill fill-unit" style="width: ${unitPct}%"></div></div>
                </div>
                
                <div class="avg-margin-text">Avg margin: ${formatRp(avgThisMonth)} / unit</div>
            `;
            tbody.appendChild(card);
        });

        renderChart(chartLabels, chartProfitData, chartActualUnits);
    }

    function renderChart(labels, profitData, actualData) {
        const ctx = document.getElementById('salesChart').getContext('2d');
        if (salesChartInstance) { salesChartInstance.destroy(); }

        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Segoe UI', sans-serif";

        salesChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Laba (Juta)',
                        data: profitData,
                        type: 'line',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        borderColor: '#10b981',
                        borderWidth: 2,
                        pointBackgroundColor: '#10b981',
                        pointRadius: 4,
                        fill: true,
                        tension: 0.3,
                        yAxisID: 'y'
                    },
                    {
                        label: 'Unit',
                        data: actualData,
                        type: 'bar',
                        backgroundColor: 'rgba(79, 209, 197, 0.4)',
                        borderColor: '#4FD1C5',
                        borderWidth: 1,
                        borderRadius: 4,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { position: 'top', labels: { boxWidth: 10, font: { size: 10 } } },
                },
                scales: {
                    x: { grid: { display: false } },
                    y: { 
                        type: 'linear', display: true, position: 'left',
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: {
                            callback: function(value) { return (value/1000000) + 'M'; },
                            font: { size: 10 }
                        }
                    },
                    y1: { 
                        type: 'linear', display: true, position: 'right',
                        grid: { drawOnChartArea: false },
                        ticks: { font: { size: 10 }, stepSize: 5 }
                    }
                }
            }
        });
    }

    async function initDashboard() {
        const btn = document.getElementById('syncBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch spin"></i>';
        
        try {
            const dbData = await fetchDatabase();
            if(dbData) processData(dbData);
        } catch (err) {
            alert("Gagal koneksi ke Database!");
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-bolt"></i> Sync';
        }
    }

    window.onload = initDashboard;
</script>

</body>
</html>
