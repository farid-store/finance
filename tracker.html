<head>

    <style>
        :root {
            --primary: #4FD1C5; /* Soft Tosca */
            --primary-dark: #38B2AC;
            --bg: #f7fafc;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --border: #e2e8f0;
            --success: #48bb78;
            --warning: #ecc94b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { color: var(--text-main); margin-bottom: 5px; }
        .slogan { color: var(--primary-dark); font-weight: 600; margin-top: 0; }
        
        .status-bar {
            background-color: #ebf8ff;
            color: #3182ce;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 4px solid var(--primary);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card .value { font-size: 28px; font-weight: bold; color: var(--text-main); }

        .progress-bar-container {
            width: 100%; background-color: var(--border);
            border-radius: 5px; height: 10px; margin-top: 15px; overflow: hidden;
        }

        .progress-bar {
            height: 100%; background-color: var(--primary);
            width: 0%; transition: width 1s ease;
        }

        .table-container {
            background-color: var(--card-bg); border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; padding: 20px;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        th { background-color: #f8fafc; color: var(--text-muted); font-weight: 600; font-size: 14px; }
        
        .val-aktual { font-weight: 600; color: var(--primary-dark); }
    </style>
</head>
