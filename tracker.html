<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farid Store | Mobile 100M Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Variables untuk Dark & Light Mode */
        :root[data-theme="dark"] {
            --primary: #4FD1C5; 
            --primary-dark: #319795;
            --secondary: #10b981; 
            --bg-color: #0b1120; 
            --card-bg: rgba(30, 41, 59, 0.65);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(79, 209, 197, 0.15);
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        :root[data-theme="light"] {
            --primary: #0d9488; 
            --primary-dark: #0f766e;
            --secondary: #059669; 
            --bg-color: #f8fafc; 
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: rgba(13, 148, 136, 0.2);
            --danger: #dc2626;
            --warning: #d97706;
            --shadow: 0 8px 32px rgba(148, 163, 184, 0.2);
            --glass-border: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease, color 0.3s ease; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px 12px;
            padding-bottom: 40px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        /* Header dengan Theme Toggle */
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .header-title h1 { font-size: 20px; font-weight: 800; margin-bottom: 2px;}
        .header-title p { color: var(--primary); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;}

        .header-actions { display: flex; gap: 10px; }
        
        .btn-icon {
            background: var(--card-bg); border: 1px solid var(--border);
            color: var(--text-main); padding: 10px; border-radius: 10px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        .btn-sync {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff; border: none; padding: 10px 14px; border-radius: 10px;
            font-weight: 800; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px;
            box-shadow: 0 4px 10px rgba(79, 209, 197, 0.3);
        }
        .btn-sync:active { transform: scale(0.95); }

        /* Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; }

        /* Top Summary Cards (Glassmorphism 2.0) */
        .summary-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }

        .stat-card {
            background: var(--card-bg); padding: 20px; border-radius: 16px;
            border: 1px solid var(--glass-border); border-top: 1px solid rgba(255,255,255,0.1);
            position: relative; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--shadow); overflow: hidden;
        }

        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--primary-dark));
        }
        .stat-card.success::before { background: linear-gradient(to bottom, var(--secondary), #059669); }

        .stat-icon { position: absolute; top: 20px; right: 20px; font-size: 28px; color: var(--primary); opacity: 0.15; }
        .stat-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px;}
        .stat-value { font-size: 28px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; letter-spacing: -0.5px;}
        .stat-sub { font-size: 12px; color: var(--text-muted); line-height: 1.6; display: flex; justify-content: space-between;}
        
        .eta-badge {
            display: inline-flex; align-items: center; gap: 5px; background: rgba(245, 158, 11, 0.15);
            color: var(--warning); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; margin-top: 8px;
        }

        /* Chart Area */
        .panel {
            background: var(--card-bg); border-radius: 16px; border: 1px solid var(--glass-border);
            padding: 15px; margin-bottom: 20px; backdrop-filter: blur(12px); box-shadow: var(--shadow);
        }
        .panel-header { font-size: 13px; font-weight: 800; color: var(--text-main); margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; text-transform: uppercase; }
        
        .chart-wrapper { width: 100%; overflow-x: auto; padding-bottom: 10px; }
        .chart-container { position: relative; height: 220px; min-width: 500px; }

        /* Monthly Cards List */
        .month-list { display: flex; flex-direction: column; gap: 12px; }

        .m-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 14px; padding: 15px; position: relative; backdrop-filter: blur(8px);
        }
        .m-card.active { border-color: var(--primary); box-shadow: 0 0 15px rgba(79, 209, 197, 0.1); }

        .mc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .mc-title { font-size: 14px; font-weight: 800; color: var(--text-main); }
        .mc-subtitle { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px;}
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .badge-success { background: rgba(16, 185, 129, 0.15); color: var(--secondary); border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-pending { background: rgba(148, 163, 184, 0.1); color: var(--text-muted); border: 1px solid rgba(148, 163, 184, 0.2); }

        /* Custom Progress Bars */
        .mc-stat { margin-bottom: 12px; }
        .mc-stat:last-child { margin-bottom: 0; }
        .mc-stat-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; font-weight: 600;}
        
        .bar-bg { width: 100%; background: rgba(148, 163, 184, 0.2); height: 6px; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .fill-profit { background: linear-gradient(90deg, var(--secondary), #059669); }
        .fill-unit { background: linear-gradient(90deg, var(--primary), var(--primary-dark)); }

        .val-actual { color: var(--text-main); font-weight: 800; }
        .val-target { color: var(--text-muted); }
        .avg-margin-text { font-size: 10px; color: var(--text-muted); margin-top: 8px; text-align: right; font-style: italic;}

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-title">
            <h1>PORTFOLIO TRACKER</h1>
            <p>100M Goal | Farid Store</p>
        </div>
        <div class="header-actions">
            <button class="btn-icon" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
            <button class="btn-sync" onclick="initDashboard(true)" id="syncBtn">
                <i class="fas fa-bolt"></i> Sync
            </button>
        </div>
    </header>

    <div class="summary-grid">
        <div class="stat-card fade-in" id="cardAsset" style="animation-delay: 0.1s;">
            <i class="fas fa-wallet stat-icon"></i>
            <div class="stat-title">Aset Saat Ini (Unrealized)</div>
            <div class="stat-value" id="uiTotalAsset">Rp 0</div>
            <div class="stat-sub">
                <span>Modal: <strong id="uiAssetStart" style="color: var(--text-main);">Rp 0</strong></span>
            </div>
            <div class="stat-sub" style="margin-top: 4px;">
                <span id="uiDetailAsset" style="color: var(--primary); font-weight: 600;">Kas: Rp 0 | Stok: Rp 0</span>
            </div>
            <div class="eta-badge" id="uiEta">
                <i class="fas fa-clock"></i> Mengkalkulasi ETA...
            </div>
        </div>
        
        <div class="stat-card fade-in" style="animation-delay: 0.2s;">
            <i class="fas fa-chart-line stat-icon"></i>
            <div class="stat-title">Akumulasi Profit Global</div>
            <div class="stat-value" id="uiTotalProfit" style="color: var(--secondary);">Rp 0</div>
            <div class="bar-bg" style="height: 6px; margin-top: 8px;"><div class="bar-fill fill-profit" id="globalProfitBar" style="width: 0%;"></div></div>
            <div class="stat-sub" style="margin-top: 8px; display: flex; justify-content: space-between;">
                <span id="uiProgressPct" style="font-weight: 700; color: var(--text-main);">0%</span>
                <span>Target: Rp 80 Jt</span>
            </div>
        </div>
    </div>

    <div class="panel fade-in" style="animation-delay: 0.3s;">
        <div class="panel-header">
            <span><i class="fas fa-chart-area" style="color: var(--primary)"></i> Grafik Kinerja 12 Bulan</span>
            <i class="fas fa-arrows-left-right" style="font-size: 10px; color: var(--text-muted);"></i>
        </div>
        <div class="chart-wrapper">
            <div class="chart-container">
                <canvas id="salesChart"></canvas>
            </div>
        </div>
    </div>

    <div class="panel fade-in" style="padding: 15px 10px; background: transparent; border: none; box-shadow: none; animation-delay: 0.4s;">
        <div class="panel-header" style="padding-left: 5px;">
            <span><i class="fas fa-list-check" style="color: var(--primary)"></i> Progres Detail per Bulan</span>
        </div>
        <div class="month-list" id="trackerBody">
            </div>
    </div>
</div>

<script>
    // ==========================================
    // KREDENSIAL JSONBIN
    // ==========================================
    const BIN_ID = '699644fdae596e708f3582af'; 
    const API_KEY = '$2a$10$tcKHEWwuz2sqRoMCKJfga.1xxTFW0RxpXUPnP.NI4YbivtlK1xxau'; 
    // ==========================================

    const formatRp = (num) => {
        if(num >= 1000000) return (num/1000000).toFixed(2).replace(/\.00$/, '') + ' Jt';
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    };
    
    const formatRpFull = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);

    const roadmapTargets = [
        { month: 1, profit: 4500000 }, { month: 2, profit: 5400000 },
        { month: 3, profit: 6075000 }, { month: 4, profit: 6750000 },
        { month: 5, profit: 6750000 }, { month: 6, profit: 7200000 },
        { month: 7, profit: 7200000 }, { month: 8, profit: 7650000 },
        { month: 9, profit: 7650000 }, { month: 10, profit: 7875000 },
        { month: 11, profit: 7875000 }, { month: 12, profit: 6750000 }
    ];

    let salesChartInstance = null;
    let currentTheme = localStorage.getItem('theme') || 'dark';

    // Set Initial Theme
    document.documentElement.setAttribute('data-theme', currentTheme);
    updateThemeIcon();

    function toggleTheme() {
        currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
        localStorage.setItem('theme', currentTheme);
        updateThemeIcon();
        if(salesChartInstance) salesChartInstance.update(); // Update chart colors
    }

    function updateThemeIcon() {
        const icon = document.querySelector('#themeBtn i');
        if(currentTheme === 'dark') {
            icon.className = 'fas fa-sun';
            icon.style.color = '#f59e0b';
        } else {
            icon.className = 'fas fa-moon';
            icon.style.color = '#3b82f6';
        }
    }

    // Animasi Angka (CountUp)
    function animateValue(id, start, end, duration, isCurrency = true) {
        if (start === end) return;
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            // Ease out quad
            const easeProgress = progress * (2 - progress);
            const currentVal = Math.floor(easeProgress * (end - start) + start);
            obj.innerHTML = isCurrency ? formatRpFull(currentVal) : currentVal;
            if (progress < 1) {
                window.requestAnimationFrame(step);
            } else {
                obj.innerHTML = isCurrency ? formatRpFull(end) : end;
            }
        };
        window.requestAnimationFrame(step);
    }

    async function fetchDatabase() {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            method: 'GET',
            headers: { 'X-Master-Key': API_KEY, 'X-Access-Key': API_KEY, 'Content-Type': 'application/json' }
        });
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        const data = await response.json();
        return data.record;
    }

    function parseDateString(s) { 
        if(!s || s === 'Imported' || s === 'Bulan Lalu') return new Date();
        const p = s.split(' ');
        if (p[0].includes('-')) return new Date(p[0]);
        const d = p[0].split('/');
        return new Date(d[2], d[1]-1, d[0]); 
    }

    function processData(db) {
        let monthlyActuals = {};
        let startBalance = Number(db.startBalance) || 0;
        let belanjaBaru = 0, uangMasuk = 0, profit = 0;
        let floatModal = 0, floatPrice = 0, totalUnitTerjual = 0;

        // Proses Item Utama
        if(db.items) {
            db.items.forEach(i => {
                if (i.status === 'sold') {
                    totalUnitTerjual++;
                    if (i.type === 'new') belanjaBaru += i.modal;
                    uangMasuk += i.price;
                    const profitItem = i.price - i.modal;
                    profit += profitItem;
                    
                    if(i.soldAt) {
                        let d = parseDateString(i.soldAt);
                        let monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                        if(!monthlyActuals[monthKey]) monthlyActuals[monthKey] = { units: 0, profit: 0 };
                        monthlyActuals[monthKey].units += 1;
                        monthlyActuals[monthKey].profit += profitItem;
                    }
                } else if (i.status === 'stok') {
                    if (i.type === 'new') belanjaBaru += i.modal;
                    floatModal += i.modal;
                    floatPrice += i.price;
                }
            });
        }

        // Proses Extra Profit
        let extraProfitTotal = 0;
        if(db.extraProfits) {
            db.extraProfits.forEach(p => {
                let calcProfit = p.profit;
                if(p.name === 'Poco M3' && p.modal === 400000) calcProfit = p.price - 450000;
                
                extraProfitTotal += calcProfit;
                totalUnitTerjual++; 
                
                let d = new Date(Math.floor(p.id)); 
                let monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                if(!monthlyActuals[monthKey]) monthlyActuals[monthKey] = { units: 0, profit: 0 };
                
                monthlyActuals[monthKey].profit += calcProfit;
                monthlyActuals[monthKey].units += 1;
            });
        }

        const totalProfitBersih = profit + extraProfitTotal;
        const cashSisa = startBalance - belanjaBaru + uangMasuk;
        const totalAsetReal = cashSisa + floatPrice; 

        updateUI(monthlyActuals, totalAsetReal, totalProfitBersih, totalUnitTerjual, startBalance, cashSisa, floatPrice);
    }

    function updateUI(actualsData, totalAset, globalGrossProfit, globalUnits, startBalance, cashSisa, floatPrice) {
        const tbody = document.getElementById('trackerBody');
        tbody.innerHTML = '';
        
        // Animasi Update Nilai
        const prevAset = parseInt(document.getElementById('uiTotalAsset').innerText.replace(/\D/g,'')) || 0;
        const prevProfit = parseInt(document.getElementById('uiTotalProfit').innerText.replace(/\D/g,'')) || 0;
        
        animateValue('uiTotalAsset', prevAset, totalAset, 1000);
        animateValue('uiTotalProfit', prevProfit, globalGrossProfit, 1000);
        
        document.getElementById('uiAssetStart').innerText = formatRpFull(startBalance);
        document.getElementById('uiDetailAsset').innerText = `Kas: ${formatRpFull(cashSisa)} | Stok: ${formatRpFull(floatPrice)}`;
        
        if(totalAset >= 100000000) document.getElementById('cardAsset').classList.add('success');
        
        // Kalkulasi Persentase Global
        const targetGlobal = 80000000;
        const progressPct = Math.min((globalGrossProfit / targetGlobal) * 100, 100).toFixed(1);
        document.getElementById('globalProfitBar').style.width = `${progressPct}%`;
        document.getElementById('uiProgressPct').innerText = `${progressPct}% Selesai`;

        // Kalkulasi Prediksi ETA (Berdasarkan rata-rata profit 3 bulan terakhir aktif)
        let activeMonthsKey = Object.keys(actualsData).sort();
        let last3Months = activeMonthsKey.slice(-3);
        let sumRecentProfit = last3Months.reduce((acc, key) => acc + actualsData[key].profit, 0);
        let avgRecentProfit = sumRecentProfit / (last3Months.length || 1);
        
        let targetAset = 100000000;
        let sisaTarget = targetAset - totalAset;
        let etaText = "Data belum cukup";
        
        if (sisaTarget <= 0) {
            etaText = "Target Tercapai! 🎉";
            document.getElementById('uiEta').style.color = "var(--secondary)";
            document.getElementById('uiEta').style.background = "rgba(16, 185, 129, 0.15)";
        } else if (avgRecentProfit > 0) {
            let monthsLeft = Math.ceil(sisaTarget / avgRecentProfit);
            let d = new Date();
            d.setMonth(d.getMonth() + monthsLeft);
            let monthNamesShort = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
            etaText = `Estimasi 100M: ${monthNamesShort[d.getMonth()]} ${d.getFullYear()} (${monthsLeft} bln lagi)`;
        }
        document.getElementById('uiEta').innerHTML = `<i class="fas fa-clock"></i> ${etaText}`;

        // Chart Data
        let chartLabels = [];
        let chartProfitData = [];
        let chartActualUnits = [];
        
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
        let startMonth = 2; // Mulai Februari
        let startYear = 2026;
        let globalAvgMargin = globalUnits > 0 ? (globalGrossProfit / globalUnits) : 150000;

        let currentDate = new Date();
        let currentMonthKey = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
        
        let accumulatedDeficit = 0;

        // Generate Cards & Smart Targets
        roadmapTargets.forEach((t, index) => {
            let m = ((startMonth - 1 + index) % 12) + 1;
            let y = startYear + Math.floor((startMonth - 1 + index) / 12);
            let monthKey = `${y}-${String(m).padStart(2, '0')}`;
            
            let actUnits = actualsData[monthKey] ? actualsData[monthKey].units : 0;
            let actProfit = actualsData[monthKey] ? actualsData[monthKey].profit : 0;

            chartLabels.push(`${monthNames[m-1]} ${y}`);
            chartProfitData.push(actProfit);
            chartActualUnits.push(actUnits);

            // Fitur Smart Target: Jika bulan lalu tidak capai target, defisit ditambahkan ke target bulan ini
            let smartTargetProfit = t.profit + accumulatedDeficit;
            if (smartTargetProfit < 0) smartTargetProfit = t.profit; // Mencegah target negatif jika surplus besar
            
            let avgThisMonth = actUnits > 0 ? (actProfit / actUnits) : globalAvgMargin;
            let dynamicTargetUnit = Math.ceil(smartTargetProfit / avgThisMonth); 
            if (actProfit >= smartTargetProfit) dynamicTargetUnit = actUnits; 
            
            let profitPct = Math.min((actProfit / smartTargetProfit) * 100, 100);
            let unitPct = Math.min((actUnits / dynamicTargetUnit) * 100, 100);

            // Update deficit untuk bulan berikutnya (jika bulan ini sudah lewat/berjalan)
            if (monthKey <= currentMonthKey) {
                accumulatedDeficit += (t.profit - actProfit);
            }

            let statusBadge = actProfit >= smartTargetProfit 
                ? '<span class="badge badge-success"><i class="fas fa-check"></i> Tercapai</span>' 
                : (actProfit > 0 ? '<span class="badge badge-warning">Proses</span>' : '<span class="badge badge-pending">Pending</span>');

            let isCurrent = (monthKey === currentMonthKey);
            
            // Note if target was adjusted
            let targetNote = accumulatedDeficit > 0 && isCurrent ? `<br><span style="font-size:9px; color:var(--warning);">*Target disesuaikan (defisit bln lalu)</span>` : '';

            const card = document.createElement('div');
            card.className = `m-card fade-in ${isCurrent ? 'active' : ''}`;
            card.style.animationDelay = `${0.3 + (index * 0.1)}s`;
            
            card.innerHTML = `
                <div class="mc-header">
                    <div>
                        <div class="mc-title">Bulan ${t.month} ${isCurrent ? '<i class="fas fa-crosshairs fa-spin" style="color:var(--primary); font-size:12px; margin-left:4px;"></i>' : ''}</div>
                        <span class="mc-subtitle">${monthNames[m-1]} ${y}</span>
                    </div>
                    ${statusBadge}
                </div>
                
                <div class="mc-stat">
                    <div class="mc-stat-header">
                        <span style="color: var(--secondary)">Laba Margin</span>
                        <span style="text-align:right;"><span class="val-actual">${formatRp(actProfit)}</span> <span class="val-target">/ ${formatRp(smartTargetProfit)}</span> ${targetNote}</span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill fill-profit" style="width: ${profitPct}%"></div></div>
                </div>

                <div class="mc-stat">
                    <div class="mc-stat-header">
                        <span style="color: var(--primary)">Penjualan Unit</span>
                        <span><span class="val-actual">${actUnits}</span> <span class="val-target">/ ${dynamicTargetUnit} Unit</span></span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill fill-unit" style="width: ${unitPct}%"></div></div>
                </div>
                
                <div class="avg-margin-text">Avg margin: ${formatRp(avgThisMonth)} / unit</div>
            `;
            tbody.appendChild(card);
        });

        renderChart(chartLabels, chartProfitData, chartActualUnits);
    }

    function renderChart(labels, profitData, actualData) {
        const ctx = document.getElementById('salesChart').getContext('2d');
        if (salesChartInstance) { salesChartInstance.destroy(); }

        const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim() || '#94a3b8';
        const gridColor = currentTheme === 'dark' ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';

        Chart.defaults.color = textColor;
        Chart.defaults.font.family = "'Segoe UI', sans-serif";

        salesChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Laba (Juta)',
                        data: profitData,
                        type: 'line',
                        backgroundColor: 'rgba(16, 185, 129, 0.15)',
                        borderColor: '#10b981',
                        borderWidth: 2,
                        pointBackgroundColor: '#10b981',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 1,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.4, // Smooth curve
                        yAxisID: 'y'
                    },
                    {
                        label: 'Unit Terjual',
                        data: actualData,
                        type: 'bar',
                        backgroundColor: 'rgba(79, 209, 197, 0.6)',
                        borderColor: '#4FD1C5',
                        borderWidth: 1,
                        borderRadius: 4,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { position: 'top', labels: { boxWidth: 10, font: { size: 11, weight: '600' } } },
                    tooltip: {
                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                        titleFont: { size: 13 },
                        bodyFont: { size: 12 },
                        padding: 10,
                        cornerRadius: 8,
                        displayColors: true,
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) { label += ': '; }
                                if (context.dataset.yAxisID === 'y') {
                                    label += new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumSignificantDigits: 3 }).format(context.parsed.y);
                                } else {
                                    label += context.parsed.y + ' Unit';
                                }
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    x: { grid: { display: false } },
                    y: { 
                        type: 'linear', display: true, position: 'left',
                        grid: { color: gridColor },
                        ticks: {
                            callback: function(value) { return (value/1000000) + 'M'; },
                            font: { size: 10 }
                        }
                    },
                    y1: { 
                        type: 'linear', display: true, position: 'right',
                        grid: { drawOnChartArea: false },
                        ticks: { font: { size: 10 }, stepSize: 5 }
                    }
                }
            }
        });
    }

    async function initDashboard(forceSync = false) {
        const btn = document.getElementById('syncBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch spin"></i>';
        
        try {
            // Fitur Caching: Load Local Storage Dulu agar instant
            const cachedData = localStorage.getItem('faridStoreCache');
            if (cachedData && !forceSync) {
                processData(JSON.parse(cachedData));
            }

            // Fetch Database di background
            const dbData = await fetchDatabase();
            if(dbData) {
                localStorage.setItem('faridStoreCache', JSON.stringify(dbData));
                processData(dbData); // Re-render dengan data terbaru
            }
        } catch (err) {
            console.error(err);
            if(!localStorage.getItem('faridStoreCache')) {
                alert("Gagal koneksi ke Database! Pastikan internet stabil.");
            }
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-bolt"></i> Sync';
        }
    }

    // Auto load saat pertama buka
    window.onload = () => initDashboard(false);
</script>

</body>
</html>
